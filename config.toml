baseurl      = "https://arubhardwaj.github.io/"
title        = "Aru Bhardwaj"
languageCode = "en-us"
theme        = "hello-friend-ng"
paginate     = 10

[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"

  # Subtitle for home
  homeSubtitle = "An Econ Grad messing around computation and economics."

  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  disableReadOtherPosts = false

  # Enable sharing buttons, if you like
  enableSharingButtons = true

  # Metadata mostly used in document's head
  description = "My new homepage or blog"
  keywords = "homepage, blog"
  images = [""]

[taxonomies]
    category = "blog"
    tag      = "tags"
    series   = "series"

[languages]
  [languages.en]
    title = "Aru Bhardwaj"
    subtitle = " "
    keywords = ""
    copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "cd /user/arubhardwaj"
      logoHomeLink = "/"
    # or
    #
    # path = "/img/your-example-logo.svg"
    # alt = "Your example logo alt text"


  # Social icons
  [[params.social]]
    name = "twitter"
    url  = "https://twitter.com/AruEcon"

  [[params.social]]
    name = "email"
    url  = "mailto:arubhardwaj@tuta.io"

  [[params.social]]
    name = "github"
    url  = "https://github.com/arubhardwaj"

  [[params.social]]
    name = "linkedin"
    url  = "https://www.linkedin.com/arubhardwaj"


  [[params.social]]
    name = "telegram"
    url  = "https://telegram.me/arubhardwaj"


